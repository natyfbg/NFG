{% extends "base.html" %}
{% block title %}Sign in – NFG{% endblock %}

{% block content %}
<div class="d-flex justify-content-center">
  <div class="card shadow-sm p-4" style="max-width: 440px; width: 100%;">
    <h1 class="h4 mb-3 text-center">Sign in</h1>

    <form method="post" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% if request.args.get('next') %}
        <input type="hidden" name="next" value="{{ request.args.get('next') }}">
      {% endif %}

      <div class="mb-3">
        <label class="form-label">Email or Username</label>
        <input class="form-control" name="identity" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required>
      </div>

      <button type="submit" class="btn btn-dark w-100">Sign in</button>
    </form>

    <div class="small text-muted mt-3 text-center">
      New here?
      <a href="{{ url_for('account_register') }}">Create account</a>
      •
      <a href="{{ url_for('login') }}">Admin sign in</a>
    </div>
  </div>
</div>
{% endblock %}
