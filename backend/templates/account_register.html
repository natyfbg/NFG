{% extends "base.html" %}
{% block title %}Create account – NFG{% endblock %}

{% block content %}
<div class="d-flex justify-content-center">
  <div class="card shadow-sm p-4" style="max-width: 480px; width: 100%;">
    <h1 class="h4 mb-3 text-center">Create account</h1>

    <form method="post" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" name="username" minlength="3" maxlength="30" required>
        <div class="form-text">Letters, numbers, underscore. 3–30 chars.</div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" minlength="8" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input class="form-control" type="password" name="confirm_password" minlength="8" required>
      </div>

      <button type="submit" class="btn btn-dark w-100">Create account</button>
    </form>

    <div class="small text-muted mt-3 text-center">
      Already have an account?
      <a href="{{ url_for('account_login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
